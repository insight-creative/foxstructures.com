collections_config:
  pages:
    path: content
    icon: docs
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  portfolio:
    path: content/portfolio
    glob:
      - '!_index.md'
    icon: work
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  careers:
    path: content/careers
    glob:
      - '!_index.md'
    icon: tools_power_drill
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  blog:
    icon: notes
    disable_url: false
    add_options:
      - name: Add A New Blog Post
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    schemas:
      default:
        path: schemas/blog.md
        reorder_inputs: true
        hide_extra_inputs: false
        remove_empty_inputs: false
        remove_extra_inputs: true
  about:
    path: content/about
    glob:
      - '!_index.md'
    icon: person
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  construction_services:
    path: content/construction-services
    glob:
      - '!_index.md'
    icon: construction
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  data:
    path: data
    icon: data_usage
    disable_url: true
    disable_add: true
    disable_add_folder: true
    disable_file_actions: true
_inputs:
  menu:
    hidden: true
    cascade: true
  layout:
    hidden: true
    cascade: true
  logo:
    type: image
    comment: Set your brand logo.
    cascade: true
  footer_logo:
    type: image
    comment: Set your brand logo in the footer.
    cascade: true
  featured_image:
    type: image
    comment: >-
      Set your featured image. Featured images are used as your SEO preview
      image when shared on social media or when your page is found in organic
      search results.
    cascade: true
  hero.image_url:
    type: image
    options:
      accepts_mime_types:
        - image/jpeg
    comment: This is the main image used at the top of every page.
    cascade: true
  image_url:
    type: image
    options:
      accepts_mime_types:
        - image/jpeg
    comment: >-
      Upload a .jpg image. Make sure to check the documentation for image
      handling best practices before adding images to the website.
    cascade: true
  icon:
    type: image
    options:
      accepts_mime_types:
        - image/jpeg
        - image/svg+xml
    cascade: true
  heading:
    type: text
    cascade: true
  url:
    type: text
    comment: Set a custom URL for your page. ex. /our-team/first-m-last/
    cascade: true
  video:
    type: text
    comment: >-
      Please reach out to Insight Creative, Inc. if you need help changing a
      video.
    cascade: true
  background_color:
    type: select
    options:
      allow_empty: true
      values:
        - white
        - gray
    comment: Choose between "white" or "gray" as a background color
    cascade: true
  body:
    type: markdown
    cascade: true
  project_features:
    type: markdown
    cascade: true
  specs:
    type: markdown
    cascade: true
  quote.quote_short:
    type: markdown
    cascade: true
  quote.quote_full:
    type: markdown
    cascade: true
  button.button_url:
    type: url
    cascade: true
  hero.button_url:
    type: url
    cascade: true
  cta.body:
    type: markdown
    cascade: true
_editables:
  text:
    allow_custom_markup: true
    remove_custom_markup: false
    italic: true
  block:
    allow_custom_markup: false
    remove_custom_markup: false
    format: p h3
    image_size_attributes: true
    redo: true
    undo: true
  content:
    allow_custom_markup: false
    remove_custom_markup: false
    blockquote: true
    bold: true
    bulletedlist: true
    embed: true
    format: p h2 h3 h4 h5 h6 pre address div
    horizontalrule: true
    image_size_attributes: true
    italic: true
    link: true
    numberedlist: true
    redo: true
    snippet: true
    strike: true
    subscript: true
    superscript: true
    table: true
    underline: true
    undo: true
_snippets:
  responsive_image:
    template: hugo_shortcode_named_args
    inline: false
    preview:
      view: gallery
      text: Responsive Image
      subtext: Full-width image with optimized srcset
      gallery:
        image:
          - key: image_url
        fit: cover
    definitions:
      shortcode_name: responsive-image
      named_args:
        - editor_key: image_url
          type: string
        - editor_key: image_alt
          type: string
    _inputs:
      image_url:
        type: image
        cascade: true
      image_alt:
        type: text
        cascade: true
timezone: Etc/UTC
