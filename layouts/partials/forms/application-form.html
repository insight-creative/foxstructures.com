<form class="mt-1" id="apply" name="job_application" enctype="multipart/form-data" method="post" action="/thank-you/">
  <div class="visually-hidden">
      <label for="_subject">New application from the Fox Structures Job Application Form</label>
      <input aria-label="subject" id="_subject" name="_subject" value="New application from the Fox Structures Job Application Form">
  </div>
  <h2 class="h4 text-primary">Apply Today</h2>
  <p>To get started, please submit your contact information below.</p>
  <hr>
  <div class="contact-form__form-group">
      <label for="first_name">First Name *</label>
      <input name="First Name" id="first_name" type="text" class="contact-form__form-control" required>
  </div>
  <div class="contact-form__form-group">
      <label for="last_name">Last Name *</label>
      <input name="Last Name" id="last_name" type="text" class="contact-form__form-control" required>
  </div>
  <div class="contact-form__form-group">
      <label for="phone">Phone *</label>
      <input name="Phone" id="phone" type="tel" class="contact-form__form-control" required>
  </div>
  <div class="contact-form__form-group">
      <label for="email">Email *</label>
      <input name="email" id="email" type="email" class="contact-form__form-control" required>
  </div>
  <div class="contact-form__form-group">
      <label for="education">Do you have a high school diploma? *</label>
      <select name="education" id="education" class="contact-form__form-control" required>
        <option value="">Please choose an option:</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>
  </div>
  <div class="contact-form__form-group">
      <label for="additional_education">Do you have any additional education?</label>
      <input name="Additional Education" id="additional_education" type="text" class="contact-form__form-control">
  </div>
  <div class="contact-form__form-group">
      <label for="experience">Do you have any construction experience? *</label>
      <select name="experience" id="experience" class="contact-form__form-control" required>
        <option value="">Please choose an option:</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>
  </div>
  <div class="contact-form__form-group">
      <label for="additional_experience">If so, list construction experience here:</label>
      <input name="Additional Experience" id="additional_experience" type="text" class="contact-form__form-control">
  </div>
  <div class="contact-form__form-group">
      <label for="drivers_license">Do you have a driver's license? *</label>
      <select name="drivers_license" id="drivers_license" class="contact-form__form-control" required>
        <option value="">Please choose an option:</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>
  </div>
  <div class="contact-form__form-group">
      <label for="cdl_license">Do you have a CDL? *</label>
      <select name="cdl_license" id="cdl_license" class="contact-form__form-control" required>
        <option value="">Please choose an option:</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>
  </div>
  {{ if eq .Title "Apply" }}
    <div class="contact-form__form-group">
        <label for="contact_preference">Position Applying For? *</label>
        <select name="Contact Preference" id="contact_preference" class="contact-form__form-control" required>
            <option value="">Please choose an option</option>
            {{ range where site.RegularPages "Section" "careers" }}
                <option value="{{ .Title }}">{{ .Title }}</option>
            {{- end -}}
        </select>
    </div>
  {{ end }}
  <input type="hidden" name="inbox_key" value="fox-structures-hr-inbox">
  <input type="text" name="_gotcha" class="visually-hidden" aria-label="gotcha">
  <div class="cf-turnstile" data-sitekey="0x4AAAAAAAzzY3BHaVr2Ns_D"></div>
  <br>
  <button type="submit" class="contact-form__btn btn btn--primary">Send Application</button>
</form>
